<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Docsify Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/packages/docsify-plugin/src/styles/theme.css">
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10",
      "preact/hooks": "https://esm.sh/preact@10/hooks",
      "preact-render-to-string": "https://esm.sh/preact-render-to-string@6?external=preact",
      "htm": "https://esm.sh/htm@3",
      "htm/preact": "https://esm.sh/htm/preact",
      "unified": "https://esm.sh/unified@11?bundle",
      "remark-parse": "https://esm.sh/remark-parse@11?bundle",
      "unist-util-visit": "https://esm.sh/unist-util-visit@5?bundle"
    }
  }
  </script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f9fafb; }
    h2 { font-size: 1rem; font-weight: 600; color: #374151; margin: 1.5rem 0 .5rem; }
    .box { border: 1px solid #e5e7eb; border-radius: .5rem; padding: 1rem; background: white; min-height: 3rem; }
  </style>
</head>
<body>

  <h1 style="font-size:1.5rem;font-weight:bold;margin-bottom:.5rem">No Docsify Demo</h1>
  <h2>1. Hand-written tag in HTML</h2>
  <div class="box">
    <entity-schema data-props='{"name":"User","fields":[{"name":"id","type":"uuid","required":true},{"name":"email","type":"string","required":true}]}'></entity-schema>
  </div>

  <h2>2. Injected via innerHTML</h2>
  <div class="box" id="renderer-output">waiting...</div>

  <h2>3. Injected after 2s</h2>
  <div class="box" id="late-output">waiting 2 seconds...</div>

  <script type="module">
    const { defineCustomElements } = await import('/packages/docsify-plugin/src/core/custom-elements.js');
    const { defaultComponents } = await import('/packages/docsify-plugin/src/components/index.js');
    defineCustomElements(defaultComponents);

    // 2 — simulate what any markdown renderer outputs
    const data = { name: 'Product', fields: [{ name: 'sku', type: 'string', required: true }] };
    const json = JSON.stringify(data).replace(/"/g, '&quot;');
    document.getElementById('renderer-output').innerHTML = `<entity-schema data-props="${json}"></entity-schema>`;

    // 3 — late injection
    setTimeout(() => {
      const lateData = { name: 'Order', fields: [{ name: 'total', type: 'number', required: true }] };
      const lateJson = JSON.stringify(lateData).replace(/"/g, '&quot;');
      document.getElementById('late-output').innerHTML = `<entity-schema data-props="${lateJson}"></entity-schema>`;
    }, 2000);
  </script>

</body>
</html>
