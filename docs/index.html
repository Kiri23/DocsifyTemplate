<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Docsify theme + Prism theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">

  <!-- Tailwind CSS v4 browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- User config (sync — sets window.__docsifyTemplateConfig before anything else) -->
  <script src="./config.js"></script>

  <!-- Tailwind @theme — merges user theme over defaults, no imports needed -->
  <script type="module">
    const defaults = {
      primary: '#0891b2', primaryLight: '#ecfeff', primaryText: '#0e7490', brand: '#95c22f',
      surface: '#faf9f7', surfaceRaised: '#f5f5f4', surfaceSunken: '#efedeb',
      border: '#e7e5e4', borderStrong: '#d6d3d1',
      textPrimary: '#1c1917', textSecondary: '#44403c', textTertiary: '#78716c', textMuted: '#a8a29e',
      techSurface: '#f8fafc', techAccent: '#6366f1', techHeading: '#1e293b',
      techSubheading: '#334155', techText: '#475569',
      codeBg: '#1e1e2e', codeText: '#cdd6f4', success: '#34d399'
    };
    const cfg = window.__docsifyTemplateConfig || {};
    const t = { ...defaults, ...cfg.theme };

    const style = document.createElement('style');
    style.setAttribute('type', 'text/tailwindcss');
    style.textContent = `@theme {
      --color-primary: ${t.primary};
      --color-primary-light: ${t.primaryLight};
      --color-primary-text: ${t.primaryText};
      --color-brand: ${t.brand};
      --color-surface: ${t.surface};
      --color-surface-raised: ${t.surfaceRaised};
      --color-surface-sunken: ${t.surfaceSunken};
      --color-border: ${t.border};
      --color-border-strong: ${t.borderStrong};
      --color-text-primary: ${t.textPrimary};
      --color-text-secondary: ${t.textSecondary};
      --color-text-tertiary: ${t.textTertiary};
      --color-text-muted: ${t.textMuted};
      --color-tech-surface: ${t.techSurface};
      --color-tech-accent: ${t.techAccent};
      --color-tech-heading: ${t.techHeading};
      --color-tech-subheading: ${t.techSubheading};
      --color-tech-text: ${t.techText};
      --color-code-bg: ${t.codeBg};
      --color-code-text: ${t.codeText};
      --color-success: ${t.success};
    }`;
    document.head.appendChild(style);

    document.title = cfg.title || 'DocsifyTemplate';

    for (const entry of cfg.head || []) {
      const el = document.createElement(entry.tag);
      for (const [k, v] of Object.entries(entry.attrs || {}))
        v === true ? el.setAttribute(k, '') : el.setAttribute(k, v);
      if (entry.content) el.textContent = entry.content;
      document.head.appendChild(el);
    }
  </script>

  <!-- Plugin styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docs-engine@0.1.7/dist/theme.css">
</head>
<body>
  <div id="app"></div>

  <!--
    Load order:
      1. js-yaml (sync classic script — sets window.jsyaml before module executes)
      2. docs-engine adapter (sets $docsify, registers all plugins + components)
      3. Docsify + HTMX (deferred — module always runs before defer scripts)
  -->

  <!-- Peer dep: js-yaml must be a global before the plugin module runs -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <!-- Docsify adapter — self-contained bundle, no importmap needed -->
  <script type="module" src="https://esm.sh/docs-engine@0.1.7/docsify?bundle"></script>

  <!-- Docsify core + search (deferred — plugin module registers hooks first) -->
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- HTMX (deferred) -->
  <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.3/dist/htmx.min.js"></script>
</body>
</html>
