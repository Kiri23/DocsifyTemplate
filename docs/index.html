<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocsifyTemplate</title>

  <!-- Font preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Prism themes for code blocks -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">

  <!-- Tailwind CSS v4 browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #0891b2;
      --color-primary-light: #ecfeff;
      --color-brand: #95c22f;
      --color-surface: #faf9f7;
      --color-surface-raised: #f5f5f4;
      --color-border: #e7e5e4;
      --color-border-strong: #d6d3d1;
      --color-text-primary: #1c1917;
      --color-text-secondary: #44403c;
      --color-text-muted: #78716c;
    }
  </style>

  <!-- Custom theme overrides -->
  <link rel="stylesheet" href="../lib/styles/theme.css">
</head>
<body>
  <div id="app"></div>

  <!-- js-yaml for code fence components -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <!-- Components (register globals — must load before Docsify) -->
  <script src="../lib/components/code-block.js"></script>
  <script src="../lib/components/tabs.js"></script>
  <script src="../lib/components/card-grid.js"></script>
  <script src="../lib/components/entity-schema.js"></script>
  <script src="../lib/components/api-endpoint.js"></script>
  <script src="../lib/components/status-flow.js"></script>
  <script src="../lib/components/region-toggle.js"></script>
  <script src="../lib/components/directive-table.js"></script>
  <script src="../lib/components/step-type.js"></script>
  <script src="../lib/components/config-example.js"></script>
  <script src="../lib/components/side-by-side.js"></script>

  <script>
    window.$docsify = {
      name: 'DocsifyTemplate',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search...',
        noData: 'No results.',
        depth: 6
      },
      auto2top: true
    };
  </script>

  <!-- Custom plugins (must load before Docsify core — they push to $docsify.plugins) -->
  <script src="../lib/plugins/component-renderer.js"></script>
  <script src="../lib/plugins/latex-export.js"></script>

  <!-- Copy button plugin — adds copy buttons to all code blocks -->
  <script>
    window.$docsify = window.$docsify || {};
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function copyButtonPlugin(hook) {
        hook.doneEach(function() {
          var pres = document.querySelectorAll('.markdown-section pre');
          pres.forEach(function(pre) {
            if (pre.querySelector('.code-copy-btn')) return;
            var code = pre.querySelector('code');
            if (!code) return;
            // Skip mermaid and component-rendered blocks
            if (code.classList.contains('lang-mermaid') || code.classList.contains('language-mermaid')) return;

            pre.style.position = 'relative';
            var btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.textContent = 'Copy';
            btn.addEventListener('click', function() {
              var text = code.textContent;
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                  btn.textContent = '\u2713 Copied';
                  btn.classList.add('copied');
                  setTimeout(function() {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                  }, 2000);
                }, function() {
                  btn.textContent = 'Failed';
                  setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
                });
              } else {
                // Fallback for older browsers / insecure contexts
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try {
                  document.execCommand('copy');
                  btn.textContent = '\u2713 Copied';
                  btn.classList.add('copied');
                  setTimeout(function() {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                  }, 2000);
                } catch(e) {
                  btn.textContent = 'Failed';
                  setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
                }
                document.body.removeChild(ta);
              }
            });
            pre.appendChild(btn);
          });
        });
      }
    ]);
  </script>

  <!-- Console greeting for devs -->
  <script>
    console.log(
      '%cDocsifyTemplate',
      'font-size:1.5rem;font-weight:800;color:#0891b2'
    );
    console.log('Write YAML, get docs. No build step.\nhttps://github.com/Kiri23/DocsifyTemplate');
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Docsify search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Prism.js + languages -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>

  <!-- HTMX -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.3/dist/htmx.min.js"></script>

  <!-- HTMX virtual routes (loads after HTMX) -->
  <script src="../lib/plugins/htmx-virtual.js"></script>

  <!-- Dev only: Eruda console (remove for production) -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init(); console.log('🔥 Docsify loaded in Acode!');</script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
  </script>
</body>
</html>
