<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocsifyTemplate</title>

  <!-- Font preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Prism themes for code blocks -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">

  <!-- Tailwind CSS v4 browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      /* Brand */
      --color-primary: #0891b2;
      --color-primary-light: #ecfeff;
      --color-primary-text: #0e7490;
      --color-brand: #95c22f;

      /* Surfaces */
      --color-surface: #faf9f7;
      --color-surface-raised: #f5f5f4;
      --color-surface-sunken: #efedeb;

      /* Borders */
      --color-border: #e7e5e4;
      --color-border-strong: #d6d3d1;

      /* Text */
      --color-text-primary: #1c1917;
      --color-text-secondary: #44403c;
      --color-text-tertiary: #78716c;
      --color-text-muted: #a8a29e;

      /* Technical zone */
      --color-tech-surface: #f8fafc;
      --color-tech-accent: #6366f1;
      --color-tech-heading: #1e293b;
      --color-tech-subheading: #334155;
      --color-tech-text: #475569;

      /* Code */
      --color-code-bg: #1e1e2e;
      --color-code-text: #cdd6f4;

      /* Semantic */
      --color-success: #34d399;
    }
  </style>

  <!-- Custom theme overrides -->
  <link rel="stylesheet" href="/lib/styles/theme.css">
</head>
<body>
  <div id="app"></div>

  <!--
    Script load order (all defer/module = parallel download, sequential execution):

    Phase 1 — Modules (execute first, in document order)
      importmap → renderer.js → components/index.js
      renderer.js imports core/engine.js + core/registry.js (no separate tags)

    Phase 2 — Docsify plugins + core (depend on $docsify.plugins from Phase 1)
      plugins/tutorial-header → plugins/latex-export → plugins/copy-button
      docsify@4 → plugins/sidebar → search.min.js

    Phase 3 — Post-Docsify (depend on globals from Phase 2)
      prism-*.js (need Prism bundled in docsify) → htmx → plugins/htmx-virtual

    Phase 4 — Independent (no load-order dependency)
      mermaid, eruda

    DO NOT reorder scripts across phases — each phase depends on the previous.
  -->

  <!-- Import map: Preact + HTM via esm.sh (replaces React 45KB + Babel 800KB with ~4KB) -->
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10",
      "preact/hooks": "https://esm.sh/preact@10/hooks",
      "preact-render-to-string": "https://esm.sh/preact-render-to-string@6?external=preact",
      "htm": "https://esm.sh/htm@3",
      "htm/preact": "https://esm.sh/htm/preact"
    }
  }
  </script>

  <!-- js-yaml for code fence components -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <!-- Components — single ES module entry point -->
  <!-- Module scripts are deferred: execute after parse, before DOMContentLoaded -->
  <script type="module" src="/lib/components/index.js"></script>

  <script>
    window.$docsify = {
      name: 'DocsifyTemplate',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search...',
        noData: 'No results.',
        depth: 6
      },
      auto2top: true
    };
  </script>

  <!-- Adapter: Docsify renderer (ES module — imports core/engine.js) -->
  <script type="module" src="/lib/adapters/docsify/renderer.js"></script>
  <!-- Docsify plugins (register on $docsify.plugins before Docsify loads) -->
  <script defer src="/lib/adapters/docsify/plugins/tutorial-header.js"></script>
  <script defer src="/lib/adapters/docsify/plugins/latex-export.js"></script>
  <script defer src="/lib/adapters/docsify/plugins/copy-button.js"></script>


  <!-- Docsify core (defer: ensures adapter modules execute first) -->
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Adapter: Docsify sidebar behavior -->
  <script defer src="/lib/adapters/docsify/plugins/sidebar.js"></script>

  <!-- Docsify search plugin -->
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Prism.js languages (defer: Docsify bundles Prism core, these extend it) -->
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>

  <!-- HTMX -->
  <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.3/dist/htmx.min.js"></script>

  <!-- Adapter: HTMX virtual routes for Docsify tab switching -->
  <script defer src="/lib/adapters/docsify/plugins/htmx-virtual.js"></script>

  <!-- Dev only: Eruda console (remove for production) -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init(); console.log('🔥 Docsify loaded in Acode!');</script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
  </script>

  <!-- Gemma 4 E2B — In-browser AI chat (WebGPU) -->
  <script defer src="/lib/vendor/gemma-chat/gemma-chat.js"></script>
</body>
</html>
