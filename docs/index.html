<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocsifyTemplate</title>

  <!-- Font preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Prism themes for code blocks -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">

  <!-- Tailwind CSS v4 browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Config: loads BEFORE everything, sets window.__docsifyTemplateConfig -->
  <script src="/docs/config.js"></script>

  <!--
    Theme injection: reads config.theme and generates @theme + :root CSS.
    This replaces the hardcoded @theme block.
  -->
  <script type="module">
    import { getConfig, getThemeCSS } from '/lib/core/config.js';
    const cfg = getConfig();
    const t = cfg.theme;

    // Inject Tailwind @theme from config
    const tailwindStyle = document.createElement('style');
    tailwindStyle.setAttribute('type', 'text/tailwindcss');
    tailwindStyle.textContent = `
      @theme {
        --color-primary: ${t.primary};
        --color-primary-light: ${t.primaryLight};
        --color-primary-text: ${t.primaryText};
        --color-brand: ${t.brand};
        --color-surface: ${t.surface};
        --color-surface-raised: ${t.surfaceRaised};
        --color-surface-sunken: ${t.surfaceSunken};
        --color-border: ${t.border};
        --color-border-strong: ${t.borderStrong};
        --color-text-primary: ${t.textPrimary};
        --color-text-secondary: ${t.textSecondary};
        --color-text-tertiary: ${t.textTertiary};
        --color-text-muted: ${t.textMuted};
        --color-tech-surface: ${t.techSurface};
        --color-tech-accent: ${t.techAccent};
        --color-tech-heading: ${t.techHeading};
        --color-tech-subheading: ${t.techSubheading};
        --color-tech-text: ${t.techText};
        --color-code-bg: ${t.codeBg};
        --color-code-text: ${t.codeText};
        --color-success: ${t.success};
      }
    `;
    document.head.appendChild(tailwindStyle);

    // Set page title from config
    document.title = cfg.title;

    // Inject extra <head> tags from config
    if (cfg.head && cfg.head.length) {
      for (const entry of cfg.head) {
        const el = document.createElement(entry.tag);
        if (entry.attrs) {
          for (const [k, v] of Object.entries(entry.attrs)) {
            if (v === true) el.setAttribute(k, '');
            else el.setAttribute(k, v);
          }
        }
        if (entry.content) el.textContent = entry.content;
        document.head.appendChild(el);
      }
    }
  </script>

  <!-- Custom theme overrides -->
  <link rel="stylesheet" href="/lib/styles/theme.css">
</head>
<body>
  <div id="app"></div>

  <!--
    Script load order (all defer/module = parallel download, sequential execution):

    Phase 0 — Config (sync, must run first)
      config.js → sets window.__docsifyTemplateConfig

    Phase 1 — Modules (execute first, in document order)
      importmap → config-driven init → renderer.js → components/index.js

    Phase 2 — Docsify plugins + core (depend on $docsify.plugins from Phase 1)
      features/tutorial-header (standalone)
      docsify@4 → search.min.js
      (copy-button, latex-export, sidebar, gemma-chat now imported by renderer.js)

    Phase 3 — Post-Docsify (depend on globals from Phase 2)
      prism-*.js (need Prism bundled in docsify) → htmx → features/htmx-virtual (module)

    Phase 4 — Independent, config-gated (no load-order dependency)
      mermaid, eruda — only load if enabled in config
  -->

  <!-- Import map: Preact + HTM via esm.sh -->
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10",
      "preact/hooks": "https://esm.sh/preact@10/hooks",
      "preact-render-to-string": "https://esm.sh/preact-render-to-string@6?external=preact",
      "htm": "https://esm.sh/htm@3",
      "htm/preact": "https://esm.sh/htm/preact",
      "@preact/signals": "https://esm.sh/@preact/signals@1?external=preact",
      "@preact/signals-core": "https://esm.sh/@preact/signals-core@1",
      "unified": "https://esm.sh/unified@11?bundle",
      "remark-parse": "https://esm.sh/remark-parse@11?bundle",
      "unist-util-visit": "https://esm.sh/unist-util-visit@5?bundle"
    }
  }
  </script>

  <!-- js-yaml for code fence components -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <!-- Components — single ES module entry point -->
  <script type="module" src="/lib/components/index.js"></script>

  <!-- Docsify config — driven by config.js -->
  <script type="module">
    import { getConfig } from '/lib/core/config.js';
    const cfg = getConfig();
    window.$docsify = {
      name: cfg.title,
      ...cfg.docsify,
    };
  </script>

  <!-- Adapter: Docsify renderer (ES module — imports core engine + features) -->
  <script type="module" src="/lib/adapters/docsify/renderer.js"></script>
  <!-- Docsify plugins (must load before docsify core to register via $docsify.plugins) -->
  <script defer src="/lib/adapters/docsify/features/tutorial-header.js"></script>

  <!-- Docsify core -->
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Docsify search plugin -->
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Prism.js languages — config-driven dynamic loading -->
  <script type="module">
    import { getConfig } from '/lib/core/config.js';
    const langs = getConfig().prism.languages;
    for (const lang of langs) {
      const s = document.createElement('script');
      s.src = `https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-${lang}.min.js`;
      s.defer = true;
      document.body.appendChild(s);
    }
  </script>

  <!-- HTMX -->
  <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.3/dist/htmx.min.js"></script>

  <!-- Adapter: HTMX virtual routes for Docsify tab switching -->
  <script type="module" src="/lib/adapters/docsify/features/htmx-virtual.js"></script>

  <!-- Phase 4: Config-gated features -->
  <script type="module">
    import { isFeatureEnabled, getConfig } from '/lib/core/config.js';

    // Mermaid — only load if enabled
    if (isFeatureEnabled('mermaid')) {
      const cfg = getConfig().features.mermaid;
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/mermaid@10.9/dist/mermaid.min.js';
      s.onload = () => mermaid.initialize({ startOnLoad: cfg.startOnLoad ?? false, theme: cfg.theme || 'default' });
      document.body.appendChild(s);
    }

    // Eruda dev tools — only load if enabled
    if (isFeatureEnabled('devTools')) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda';
      s.onload = () => { eruda.init(); console.log('Docsify dev tools loaded'); };
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
