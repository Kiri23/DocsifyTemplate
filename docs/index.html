<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Docsify theme + Prism theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">

  <!-- Tailwind CSS v4 browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- User config (sync — sets window.__docsifyTemplateConfig before anything else) -->
  <script src="./config.js"></script>

  <!-- Tailwind @theme + page title from config (project-specific, stays here) -->
  <script type="module">
    import { initConfig, getConfig, getThemeCSS } from './vendor/docs-engine/docs-engine.esm.js';
    initConfig(window.__docsifyTemplateConfig || {});
    const cfg = getConfig();

    const tailwindStyle = document.createElement('style');
    tailwindStyle.setAttribute('type', 'text/tailwindcss');
    tailwindStyle.textContent = `@theme {\n${getThemeCSS()}\n}`;
    document.head.appendChild(tailwindStyle);

    document.title = cfg.title;

    if (cfg.head && cfg.head.length) {
      for (const entry of cfg.head) {
        const el = document.createElement(entry.tag);
        if (entry.attrs) {
          for (const [k, v] of Object.entries(entry.attrs)) {
            if (v === true) el.setAttribute(k, '');
            else el.setAttribute(k, v);
          }
        }
        if (entry.content) el.textContent = entry.content;
        document.head.appendChild(el);
      }
    }
  </script>

  <!-- Plugin styles -->
  <link rel="stylesheet" href="./vendor/docs-engine/theme.css">

  <!--
    Import map — resolves npm packages to CDN for dev (no build step).
    Not needed when consuming the built dist bundle.
  -->
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10",
      "preact/hooks": "https://esm.sh/preact@10/hooks",
      "preact-render-to-string": "https://esm.sh/preact-render-to-string@6?external=preact",
      "preact-custom-element": "https://esm.sh/preact-custom-element?external=preact",
      "htm": "https://esm.sh/htm@3",
      "htm/preact": "https://esm.sh/htm/preact",
      "@preact/signals": "https://esm.sh/@preact/signals@1?external=preact",
      "@preact/signals-core": "https://esm.sh/@preact/signals-core@1",
      "unified": "https://esm.sh/unified@11?bundle",
      "remark-parse": "https://esm.sh/remark-parse@11?bundle",
      "unist-util-visit": "https://esm.sh/unist-util-visit@5?bundle"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <!--
    Load order:
      1. js-yaml (sync classic script — sets window.jsyaml before module executes)
      2. docsify-kiri module (sets $docsify, registers all plugins + components)
      3. Docsify + HTMX (deferred — module always runs before defer scripts)
  -->

  <!-- Peer dep: js-yaml must be a global before the plugin module runs -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <!-- Docsify adapter — wires core engine to Docsify lifecycle -->
  <script type="module" src="./vendor/docs-engine/docsify-adapter.js"></script>

  <!-- Docsify core + search (deferred — plugin module registers hooks first) -->
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- HTMX (deferred) -->
  <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.3/dist/htmx.min.js"></script>
</body>
</html>
